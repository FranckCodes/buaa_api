# Auth paths
/auth/register:
  post:
    tags: [Auth]
    summary: Inscription utilisateur
    description: Crée un nouvel utilisateur avec un ou plusieurs rôles.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [nom_complet, email, password, password_confirmation, role_codes]
            properties:
              nom_complet:
                type: string
                example: Franck Kapuya
              email:
                type: string
                format: email
                example: franck@example.com
              telephone:
                type: string
                example: "+243827029543"
              password:
                type: string
                example: password123
              password_confirmation:
                type: string
                example: password123
              role_codes:
                type: array
                items:
                  type: string
                example: [client]
    responses:
      '201':
        $ref: '#/components/responses/Created'
      '422':
        $ref: '#/components/responses/ValidationError'

/auth/login:
  post:
    tags: [Auth]
    summary: Connexion utilisateur
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                format: email
                example: admin@buaa.test
              password:
                type: string
                example: password
    responses:
      '200':
        description: Connexion réussie — retourne user + token
        content:
          application/json:
            example:
              success: true
              message: Connexion réussie.
              data:
                user:
                  id: ADM-001
                  nom_complet: Super Admin BUAA
                  email: admin@buaa.test
                token: 1|abc123...
              meta: null
              errors: null
      '422':
        description: Identifiants invalides

/auth/me:
  get:
    tags: [Auth]
    summary: Profil de l'utilisateur connecté
    security:
      - sanctumAuth: []
    responses:
      '200':
        $ref: '#/components/responses/Success'
      '401':
        $ref: '#/components/responses/Unauthorized'

/auth/logout:
  post:
    tags: [Auth]
    summary: Déconnexion
    security:
      - sanctumAuth: []
    responses:
      '200':
        $ref: '#/components/responses/Success'
      '401':
        $ref: '#/components/responses/Unauthorized'
