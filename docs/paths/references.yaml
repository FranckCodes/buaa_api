# Références paths
/references/roles:
  get:
    tags: [Références]
    summary: Liste des rôles
    responses:
      '200':
        description: Liste des rôles
        content:
          application/json:
            example:
              success: true
              data:
                - id: 1
                  code: super_admin
                  label: Super administrateur
                - id: 2
                  code: admin
                  label: Administrateur
                - id: 3
                  code: superviseur
                  label: Superviseur
                - id: 4
                  code: client
                  label: Client

/references/user-statuses:
  get:
    tags: [Références]
    summary: Liste des statuts utilisateur
    responses:
      '200':
        description: Liste des statuts
        content:
          application/json:
            example:
              success: true
              data:
                - id: 1
                  code: actif
                  label: Actif
                - id: 2
                  code: inactif
                  label: Inactif

/references/client-activity-types:
  get:
    tags: [Références]
    summary: Types d'activité client
    description: Utilisé pour le champ `client_activity_type_id`.
    responses:
      '200':
        description: Liste des types d'activité
        content:
          application/json:
            example:
              success: true
              data:
                - id: 1
                  code: agriculture
                  label: Agriculture
                - id: 2
                  code: elevage
                  label: Élevage

/references/client-structure-types:
