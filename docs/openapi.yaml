openapi: 3.0.3
info:
  title: BUAA API
  version: 1.0.0
  description: |
    Documentation OpenAPI de la plateforme BUAA.

    Cette API couvre :
    - authentification
    - utilisateurs / profils clients
    - crédits
    - commandes
    - rapports
    - support
    - publications / feed social
    - notifications
    - messagerie
    - documents
    - assurances
    - adhésions
    - dashboard / statistiques

    ## Authentification
    Toutes les routes protégées nécessitent un token Bearer Sanctum.
    Obtenez-le via `POST /auth/login`.

    ## Rôles
    - `super_admin` : accès total
    - `admin` : gestion administrative complète
    - `superviseur` : suivi terrain, portefeuille clients assignés
    - `client` : accès à ses propres données uniquement

servers:
  - url: http://localhost:8000/api
    description: Local
  - url: https://api.buaa.cd/api
    description: Production

tags:
  - name: Auth
    description: Authentification et gestion de session
  - name: References
    description: Référentiels (types, statuts, modes de paiement)
  - name: Clients
    description: Profils clients
  - name: Credits
    description: Module crédit
  - name: Orders
    description: Module commandes
  - name: Reports
    description: Module rapports
  - name: Support Tickets
    description: Module support
  - name: Posts
    description: Feed social / publications
  - name: Notifications
    description: Notifications utilisateur
  - name: Messaging
    description: Messagerie / conversations
  - name: Documents
    description: Documents polymorphiques
  - name: Insurances
    description: Module assurances
  - name: Adhesions
    description: Module adhésions / unions
  - name: Dashboard
    description: Statistiques et indicateurs

components:
  securitySchemes:
    sanctumAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Token Sanctum obtenu via POST /auth/login

  schemas:

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Opération réussie.
        data:
          nullable: true
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        errors:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string

    PaginatedMeta:
      type: object
      nullable: true
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 4
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 60
        from:
          type: integer
          nullable: true
          example: 1
        to:
          type: integer
          nullable: true
          example: 15

    ReferenceValue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: actif
        label:
          type: string
          example: Actif
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
          example: true
        sort_order:
          type: integer
          example: 1

    User:
      type: object
      properties:
        id:
          type: string
          example: CLT-45678
        nom_complet:
          type: string
          example: Franck Kapuya
        email:
          type: string
          format: email
          example: franck@example.com
        telephone:
          type: string
          nullable: true
          example: "+243827029543"
        photo_profil:
          type: string
          nullable: true
        derniere_connexion:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ReferenceValue'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceValue'
        created_at:
          type: string
          format: date-time

    Client:
      type: object
      properties:
        id:
          type: string
          example: CLT-45678
        user:
          $ref: '#/components/schemas/User'
        date_naissance:
          type: string
          format: date
          nullable: true
        lieu_naissance:
          type: string
          nullable: true
        sexe:
          type: string
          nullable: true
          enum: [M, F]
        etat_civil:
          type: string
          nullable: true
          enum: [celibataire, marie, divorce, veuf]
        adresse_complete:
          type: string
          nullable: true
        ville:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        territoire:
          type: string
          nullable: true
        activity_type:
          $ref: '#/components/schemas/ReferenceValue'
        structure_type:
          $ref: '#/components/schemas/ReferenceValue'
        profession_detaillee:
          type: string
          nullable: true
        experience_annees:
          type: integer
          example: 5
        superficie_exploitation:
          type: number
          format: float
          nullable: true
        type_culture:
          type: string
          nullable: true
        nombre_animaux:
          type: integer
          nullable: true
        revenus_mensuels:
          type: number
          format: float
          nullable: true
        banque_principale:
          type: string
          nullable: true
        numero_compte:
          type: string
          nullable: true
        reference:
          type: object
          properties:
            nom:
              type: string
              nullable: true
            telephone:
              type: string
              nullable: true
            relation:
              type: string
              nullable: true
        superviseur:
          $ref: '#/components/schemas/User'

    CreditPayment:
      type: object
      properties:
        id:
          type: integer
        periode_annee:
          type: integer
          example: 2026
        periode_mois:
          type: integer
          example: 5
        montant:
          type: number
          format: float
          example: 200.00
        statut:
          type: string
          example: en_attente
        date_paiement:
          type: string
          format: date
          nullable: true
        date_echeance:
          type: string
          format: date

    Credit:
      type: object
      properties:
        id:
          type: string
          example: CRD-20260419-ABCD
        client:
          $ref: '#/components/schemas/Client'
        type:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        montant_demande:
          type: number
          format: float
          example: 1200
        montant_approuve:
          type: number
          format: float
          nullable: true
        montant_rembourse:
          type: number
          format: float
          example: 0
        date_demande:
          type: string
          format: date
        date_approbation:
          type: string
          format: date
          nullable: true
        duree_mois:
          type: integer
          example: 6
        taux_interet:
          type: number
          format: float
          nullable: true
        prochaine_echeance:
          type: string
          format: date
          nullable: true
        montant_echeance:
          type: number
          format: float
          nullable: true
        objet_credit:
          type: string
          nullable: true
        payments:
          type: array
          items:
            $ref: '#/components/schemas/CreditPayment'
        created_at:
          type: string
          format: date-time

    OrderTracking:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
          example: Validation
        done:
          type: boolean
          example: false
        date_done:
          type: string
          format: date
          nullable: true
        ordre:
          type: integer
          example: 2

    Order:
      type: object
      properties:
        id:
          type: string
          example: CMD-20260419-EF12
        client:
          $ref: '#/components/schemas/Client'
        type:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        montant:
          type: number
          format: float
          nullable: true
        description:
          type: string
          nullable: true
        justification:
          type: string
          nullable: true
        quantite:
          type: number
          format: float
          nullable: true
        unite:
          type: string
          nullable: true
        priorite:
          type: string
          example: haute
          enum: [haute, moyenne, basse]
        progression:
          type: integer
          example: 10
        date_soumission:
          type: string
          format: date
        tracking_steps:
          type: array
          items:
            $ref: '#/components/schemas/OrderTracking'
        created_at:
          type: string
          format: date-time

    Report:
      type: object
      properties:
        id:
          type: string
          example: RPT-20260419-ZX90
        client:
          $ref: '#/components/schemas/Client'
        superviseur:
          $ref: '#/components/schemas/User'
        type:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        summary:
          type: string
          nullable: true
        value_numeric:
          type: number
          format: float
          nullable: true
        value_unit:
          type: string
          nullable: true
        value_text:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        date_rapport:
          type: string
          format: date
        validated_by:
          $ref: '#/components/schemas/User'
        motif_rejet:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SupportTicket:
      type: object
      properties:
        id:
          type: string
          example: "#4521"
        client:
          $ref: '#/components/schemas/Client'
        category:
          $ref: '#/components/schemas/ReferenceValue'
        sujet:
          type: string
          example: Impossible de soumettre mon rapport
        description:
          type: string
          nullable: true
        statut:
          type: string
          example: ouvert
          enum: [ouvert, en_cours, resolu, ferme]
        treated_by:
          $ref: '#/components/schemas/User'
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        author:
          $ref: '#/components/schemas/User'
        text:
          type: string
        created_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        author:
          $ref: '#/components/schemas/User'
        content:
          type: string
        tag:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        validated_by:
          $ref: '#/components/schemas/User'
        motif_rejet:
          type: string
          nullable: true
        likes_count:
          type: integer
          example: 3
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        category:
          type: string
          example: feed
        type:
          type: string
          example: comment
        title:
          type: string
          example: Nouveau commentaire
        body:
          type: string
          nullable: true
        is_read:
          type: boolean
          example: false
        action_label:
          type: string
          nullable: true
        action_url:
          type: string
          nullable: true
        from_user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: integer
          example: 1
        sender:
          $ref: '#/components/schemas/User'
        text:
          type: string
          nullable: true
        type:
          type: string
          example: text
          enum: [text, image, file]
        image_url:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        reply_to:
          $ref: '#/components/schemas/Message'
        status:
          type: string
          example: sent
          enum: [sent, delivered, read]
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        last_message_at:
          type: string
          format: date-time
          nullable: true
        participants:
          type: array
          items:
            $ref: '#/components/schemas/User'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        created_at:
          type: string
          format: date-time

    Document:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type_document:
          type: string
          example: piece_identite
        nom_fichier:
          type: string
          example: id.pdf
        url:
          type: string
          example: https://example.com/uploads/id.pdf
        taille_bytes:
          type: integer
          nullable: true
        mime_type:
          type: string
          nullable: true
        uploaded_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    InsuranceBeneficiary:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        age:
          type: integer
          nullable: true
        relation:
          type: string
          nullable: true

    InsuranceClaim:
      type: object
      properties:
        id:
          type: string
          example: REC-20260419-ABCD
        type_sinistre:
          type: string
        montant_reclame:
          type: number
          format: float
        montant_approuve:
          type: number
          format: float
          nullable: true
        statut:
          type: string
          example: en_analyse
          enum: [en_analyse, approuve, rejete, rembourse]
        description:
          type: string
          nullable: true
        date_sinistre:
          type: string
          format: date
          nullable: true
        date_soumission:
          type: string
          format: date
        treated_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    Insurance:
      type: object
      properties:
        id:
          type: string
          example: ASS-20260419-ABCD
        client:
          $ref: '#/components/schemas/Client'
        type:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        montant_annuel:
          type: number
          format: float
        date_souscription:
          type: string
          format: date
        date_debut:
          type: string
          format: date
          nullable: true
        date_fin:
          type: string
          format: date
          nullable: true
        prochaine_echeance:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        beneficiaries:
          type: array
          items:
            $ref: '#/components/schemas/InsuranceBeneficiary'
        claims:
          type: array
          items:
            $ref: '#/components/schemas/InsuranceClaim'
        created_at:
          type: string
          format: date-time

    Cotisation:
      type: object
      properties:
        id:
          type: integer
        annee:
          type: integer
          example: 2026
        montant:
          type: number
          format: float
        statut:
          type: string
          example: en_attente
        date_paiement:
          type: string
          format: date
          nullable: true
        reference_recu:
          type: string
          nullable: true

    Adhesion:
      type: object
      properties:
        id:
          type: string
          example: ADH-20260419-ABCD
        numero_membre:
          type: string
          example: MBR-2026-01234
        client:
          $ref: '#/components/schemas/Client'
        type:
          $ref: '#/components/schemas/ReferenceValue'
        status:
          $ref: '#/components/schemas/ReferenceValue'
        payment_mode:
          $ref: '#/components/schemas/ReferenceValue'
        date_adhesion:
          type: string
          format: date
        prochaine_echeance:
          type: string
          format: date
          nullable: true
        cotisation_initiale:
          type: number
          format: float
        cotisation_annuelle:
          type: number
          format: float
        cotisations:
          type: array
          items:
            $ref: '#/components/schemas/Cotisation'
        created_at:
          type: string
          format: date-time

    AdhesionRequest:
      type: object
      properties:
        id:
          type: string
          example: ADH-20260419-ABCD
        nom:
          type: string
        demandeur_type:
          type: string
          enum: [personne, organisation]
        telephone:
          type: string
        email:
          type: string
          nullable: true
        statut:
          type: string
          example: en_attente
          enum: [en_attente, approuve, rejete]
        date_demande:
          type: string
          format: date
        cotisation:
          type: number
          format: float
          nullable: true
        treated_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

  responses:
    Success:
      description: Opération réussie
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Created:
      description: Ressource créée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          example:
            success: false
            message: Non authentifié.
            data: null
            meta: null
            errors: null
    Forbidden:
      description: Accès refusé
      content:
        application/json:
          example:
            success: false
            message: Accès non autorisé.
            data: null
            meta: null
            errors: null
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          example:
            success: false
            message: Ressource introuvable.
            data: null
            meta: null
            errors: null
    ValidationError:
      description: Erreur de validation
      content:
        application/json:
          example:
            success: false
            message: Les données envoyées sont invalides.
            data: null
            meta: null
            errors:
              client_id: ["Le champ client id est obligatoire."]
    BusinessError:
      description: Erreur métier
      content:
        application/json:
          example:
            success: false
            message: Ce crédit est déjà approuvé.
            data: null
            meta: null
            errors: null
